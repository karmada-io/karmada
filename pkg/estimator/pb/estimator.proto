syntax = "proto3";

package github.com.karmada_io.karmada.pkg.estimator.pb;

// Package-wide variables.
option go_package = "github.com/karmada-io/karmada/pkg/estimator/pb";

// Component defines the scheduling and resource requirements for a single
// workload component (e.g., JobManager, TaskManager).
message Component {
  // Name is the identifier of the component within the workload set.
  // +required
  string name = 1;

  // ReplicaRequirements specifies the per-replica resource requirements
  // (CPU, memory, etc.) and scheduling constraints.
  // +required
  ComponentReplicaRequirements replicaRequirements = 2;

  // Replicas is the number of replicas of this component required in a single workload set.
  // +required
  int32 replicas = 3;
}

// ComponentReplicaRequirements represents the resource and scheduling requirements for each replica.
message ComponentReplicaRequirements {
  // NodeClaim represents the NodeAffinity, NodeSelector and Tolerations required by each replica.
  // +optional
  optional NodeClaim nodeClaim = 1;

  // Field 2 "resourceRequest" (map<string, k8s Quantity>) carried the per-replica resource
  // requests. To drop the dependency on the K8s Quantity type, it was replaced by
  // resourceRequestBytes. Deprecated in release-1.18 and removed in release-1.19.
  reserved 2;
  reserved "resourceRequest";

  // PriorityClassName represents the priority class name for a given ResourceRequest.
  // It is used by the resource quota estimator to check quota constraints, as ResourceQuota supports priority class as a scope.
  // +optional
  string priorityClassName = 3;

  // ResourceRequestBytes represents the resources required by each replica.
  // The value of map resourceRequestBytes is a proto-serialized resource.Quantity object.
  // Generated by calling resource.Quantity#Marshal().
  // Convertible to a resource.Quantity object by calling resource.Quantity#Unmarshal().
  // +optional
  map<string, bytes> resourceRequestBytes = 4;
}

// AssumedWorkload represents an in-flight workload that has already been assigned
// to a cluster by the scheduler but whose pods have not yet been bound to nodes.
// It is included in estimation requests so the estimator can deduct the assumed
// resource footprint from the cluster's available capacity, preventing over-commitment
// when workloads are scheduled in rapid succession.
message AssumedWorkload {
  // Namespace is the namespace of the assumed workload.
  // +required
  string namespace = 1;

  // Components lists the component types and their replica counts that are assumed.
  // Each entry corresponds to one component of the in-flight workload set.
  // +required
  repeated Component components = 2;
}

// MaxAvailableComponentSetsRequest is the gRPC request message used to estimate
// how many complete sets of components can be scheduled on a cluster.
message MaxAvailableComponentSetsRequest {
  // Cluster is the target cluster where the scheduling estimation is performed.
  // +required
  string cluster = 1;

  // Components lists the component types that form one full workload set,
  // along with their resource and replica requirements.
  // +required
  repeated Component components = 2;

  // Namespace is the namespace of the workload being estimated.
  // It is used by the accurate estimator to check the quota configurations
  // in the target member cluster.
  // +required
  string namespace = 3;

  // AssumedWorkloads lists in-flight workloads that have already been assigned
  // to this cluster but whose pods have not yet been bound to nodes.
  // The estimator deducts their resource footprint from the available capacity
  // to avoid over-commitment during back-to-back scheduling cycles.
  // +optional
  repeated AssumedWorkload assumedWorkloads = 4;
}

// MaxAvailableComponentSetsResponse is the gRPC response message containing the
// maximum number of complete component sets that can be scheduled.
message MaxAvailableComponentSetsResponse {
  // MaxSets is the maximum number of workload sets (i.e., all required components together)
  // that the target cluster can accommodate given the resource constraints.
  // +required
  int32 maxSets = 1;
}

// MaxAvailableReplicasRequest represents the request that sent by gRPC client to calculate max available replicas.
message MaxAvailableReplicasRequest {
  // Cluster represents the cluster name.
  // +required
  string cluster = 1;

  // ReplicaRequirements represents the resource and scheduling requirements for each replica.
  // +required
  ReplicaRequirements replicaRequirements = 2;

  // AssumedWorkloads lists in-flight workloads that have already been assigned
  // to this cluster but whose pods have not yet been bound to nodes.
  // The estimator deducts their resource footprint from the available capacity
  // to avoid over-commitment during back-to-back scheduling cycles.
  // +optional
  repeated AssumedWorkload assumedWorkloads = 3;
}

// MaxAvailableReplicasResponse represents the response that sent by gRPC server to calculate max available replicas.
message MaxAvailableReplicasResponse {
  // MaxReplicas represents the max replica that the cluster can produce.
  // +required
  int32 maxReplicas = 1;
}

// NodeClaim represents the NodeAffinity, NodeSelector and Tolerations required by each replica.
message NodeClaim {
  // Field 1 "nodeAffinity" (k8s NodeSelector) carried the required node affinity.
  // To drop the dependency on the K8s NodeSelector type, it was replaced by
  // nodeAffinityBytes. Deprecated in release-1.18 and removed in release-1.19.
  reserved 1;
  reserved "nodeAffinity";

  // NodeSelector is a selector which must be true for the pod to fit on a node.
  // Selector which must match a node's labels for the pod to be scheduled on that node.
  // +optional
  map<string, string> nodeSelector = 2;

  // Field 3 "tolerations" (repeated k8s Toleration) carried the pod tolerations.
  // To drop the dependency on the K8s Toleration type, it was replaced by
  // tolerationsBytes. Deprecated in release-1.18 and removed in release-1.19.
  reserved 3;
  reserved "tolerations";

  // NodeAffinityBytes represents the node affinity in bytes.
  // NodeAffinityBytes is a proto-serialized corev1.NodeSelector object.
  // Generated by calling corev1.NodeSelector#Marshal().
  // Convertible to a corev1.NodeSelector object by calling corev1.NodeSelector#Unmarshal().
  // +optional
  bytes nodeAffinityBytes = 4;

  // TolerationsBytes represents the tolerations in bytes.
  // Each item of tolerationsBytes is a proto-serialized corev1.Toleration object.
  // Generated by calling corev1.Toleration#Marshal().
  // Convertible to a corev1.Toleration object by calling corev1.Toleration#Unmarshal().
  // +optional
  repeated bytes tolerationsBytes = 5;
}

// ObjectReference contains enough information to locate the referenced object inside current cluster.
message ObjectReference {
  // APIVersion represents the API version of the referent.
  // +required
  string apiVersion = 1;

  // Kind represents the Kind of the referent.
  // +required
  string kind = 2;

  // Namespace represents the namespace for the referent.
  // For non-namespace scoped resources(e.g. 'ClusterRole')，do not need specify Namespace,
  // and for namespace scoped resources, Namespace is required.
  // If Namespace is not specified, means the resource is non-namespace scoped.
  // +required
  string namespace = 3;

  // Name represents the name of the referent.
  // +required
  string name = 4;
}

// ReplicaRequirements represents the resource and scheduling requirements for each replica.
message ReplicaRequirements {
  // NodeClaim represents the NodeAffinity, NodeSelector and Tolerations required by each replica.
  // +optional
  optional NodeClaim nodeClaim = 1;

  // Field 2 "resourceRequest" (map<string, k8s Quantity>) carried the per-replica resource
  // requests. To drop the dependency on the K8s Quantity type, it was replaced by
  // resourceRequestBytes. Deprecated in release-1.18 and removed in release-1.19.
  reserved 2;
  reserved "resourceRequest";

  // Namespace represents the namespaces belonged to a ResourceRequest
  // +optional
  string namespace = 3;

  // PriorityClassName represents the priority class name for a given ResourceRequest.
  // It is used by the resource quota estimator to check quota constraints, as ResourceQuota supports priority class as a scope.
  // +optional
  string priorityClassName = 4;

  // ResourceRequestBytes represents the resources required by each replica.
  // The value of map resourceRequestBytes is a proto-serialized resource.Quantity object.
  // Generated by calling resource.Quantity#Marshal().
  // Convertible to a resource.Quantity object by calling resource.Quantity#Unmarshal().
  // +optional
  map<string, bytes> resourceRequestBytes = 5;
}

// UnschedulableReplicasRequest represents the request that sent by gRPC client to calculate unschedulable replicas.
message UnschedulableReplicasRequest {
  // Cluster represents the cluster name.
  // +required
  string cluster = 1;

  // Resource represents the Kubernetes resource to be propagated.
  // +required
  ObjectReference resource = 2;

  // UnschedulableThreshold represents the period threshold of pod unschedulable condition.
  // This value is considered as a classification standard of unschedulable replicas.
  // +optional
  int64 unschedulableThreshold = 3;
}

// UnschedulableReplicasResponse represents the response that sent by gRPC server to calculate unschedulable replicas.
message UnschedulableReplicasResponse {
  // UnschedulableReplicas represents the unschedulable replicas that the object contains.
  // +required
  int32 unschedulableReplicas = 1;
}
