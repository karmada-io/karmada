          import_path: ml:app
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
  status:
    conditions:
      - type: Ready
        status: "False"
        reason: ZeroServeEndpoints
        message: "No serve endpoints available"
        lastTransitionTime: "2024-01-15T10:35:00Z"
    serviceStatus: ""
    numServeEndpoints: 0
    lastUpdateTime: "2024-01-15T10:35:00Z"
    activeServiceStatus:
      rayClusterName: rayservice-not-ready-cluster-xyz789
      applicationStatuses:
        ml-app:
          status: DEPLOY_FAILED
          message: "Failed to deploy application"
operation: InterpretHealth
output:
  healthy: false

---
name: "RayService is ready but upgrading"
description: "Test interpreting health for RayService when Ready is True but UpgradeInProgress is also True"
observedObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-upgrading
    namespace: production
  spec:
    serveConfigV2: |
      applications:
        - name: model-serving
          route_prefix: /predict
          import_path: model_server:app
    upgradeStrategy:
      type: NewCluster
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
  status:
    conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready with 5 serve endpoints"
        lastTransitionTime: "2024-01-15T09:00:00Z"
      - type: UpgradeInProgress
        status: "True"
        reason: BothActivePendingClustersExist
        message: "Upgrading to new cluster"
        lastTransitionTime: "2024-01-15T10:40:00Z"
    serviceStatus: Running
    numServeEndpoints: 5
    lastUpdateTime: "2024-01-15T10:40:00Z"
    observedGeneration: 3
    activeServiceStatus:
      rayClusterName: rayservice-upgrading-cluster-old
      targetCapacity: 100
      trafficRoutedPercent: 70
      applicationStatuses:
        model-serving:
          status: RUNNING
          message: "Application is running"
    pendingServiceStatus:
      rayClusterName: rayservice-upgrading-cluster-new
      targetCapacity: 100
      trafficRoutedPercent: 30
      applicationStatuses:
        model-serving:
          status: DEPLOYING
          message: "Deploying on new cluster"
operation: InterpretHealth
output:
  healthy: true

