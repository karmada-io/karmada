# test case for interpreting health of RayService
# case1. RayService is ready (healthy)
# case2. RayService is not ready (unhealthy)
# case3. RayService is ready but upgrading (considered healthy)
# case4. RayService with no status (unhealthy)
# case5. RayService with no conditions (unhealthy)

name: "RayService is ready"
description: "Test interpreting health for RayService when Ready condition is True"
observedObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-ready
    namespace: default
  spec:
    serveConfigV2: |
      applications:
        - name: fruit-app
          route_prefix: /fruit
          import_path: fruit:deployment
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
  status:
    conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready with 3 serve endpoints"
        lastTransitionTime: "2024-01-15T10:30:00Z"
    serviceStatus: Running
    numServeEndpoints: 3
    lastUpdateTime: "2024-01-15T10:30:00Z"
    observedGeneration: 2
    activeServiceStatus:
      rayClusterName: rayservice-ready-cluster-abc123
      applicationStatuses:
        fruit-app:
          status: RUNNING
          message: "Application is running"
          serveDeploymentStatuses:
            FruitStand:
              status: HEALTHY
              message: "Deployment is healthy"
operation: InterpretHealth
output:
  healthy: true

---
name: "RayService is not ready"
description: "Test interpreting health for RayService when Ready condition is False"
observedObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-not-ready
    namespace: default
  spec:
    serveConfigV2: |
      applications:
        - name: ml-app
