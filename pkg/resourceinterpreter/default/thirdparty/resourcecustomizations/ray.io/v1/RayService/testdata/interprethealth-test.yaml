---
name: "RayService with mixed conditions"
description: "Test interpreting health for RayService with multiple conditions but Ready is False"
observedObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-mixed-conditions
    namespace: default
  spec:
    serveConfigV2: |
      applications:
        - name: api-service
          route_prefix: /api
          import_path: api:service
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
  status:
    conditions:
      - type: UpgradeInProgress
        status: "False"
        reason: NoPendingCluster
        message: "No upgrade in progress"
        lastTransitionTime: "2024-01-15T10:00:00Z"
      - type: Ready
        status: "False"
        reason: RayServiceInitializing
        message: "Service is initializing"
        lastTransitionTime: "2024-01-15T10:50:00Z"
    serviceStatus: ""
    numServeEndpoints: 0
    lastUpdateTime: "2024-01-15T10:50:00Z"
    activeServiceStatus:
      rayClusterName: rayservice-mixed-cluster
      rayClusterStatus:
        state: ready
        readyWorkerReplicas: 2
operation: InterpretHealth
output:
  healthy: false