name: "RayService with mixed application statuses"
description: "Test aggregating status when different clusters have different app statuses"
desiredObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-mixed-apps
    namespace: production
  spec:
    serveConfigV2: |
      applications:
        - name: model-serving
          route_prefix: /predict
          import_path: model:app
        - name: data-processing
          route_prefix: /process
          import_path: processor:app
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
statusItems:
  - applied: true
    clusterName: member1
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready"
        lastTransitionTime: "2024-01-15T12:00:00Z"
      serviceStatus: Running
      numServeEndpoints: 4
      lastUpdateTime: "2024-01-15T12:00:00Z"
      activeServiceStatus:
        rayClusterName: "rayservice-mixed-apps-cluster1"
        applicationStatuses:
          model-serving:
            status: RUNNING
            message: "Model serving is running"
          data-processing:
            status: DEPLOYING
            message: "Data processing is deploying"
  - applied: true
    clusterName: member2
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready"
        lastTransitionTime: "2024-01-15T12:01:00Z"
      serviceStatus: Running
      numServeEndpoints: 6
      lastUpdateTime: "2024-01-15T12:01:00Z"
      activeServiceStatus:
        rayClusterName: "rayservice-mixed-apps-cluster2"
        applicationStatuses:
          model-serving:
            status: RUNNING
            message: "Model serving is running"
          data-processing:
            status: UNHEALTHY
            message: "Data processing is unhealthy"
operation: AggregateStatus
output:
