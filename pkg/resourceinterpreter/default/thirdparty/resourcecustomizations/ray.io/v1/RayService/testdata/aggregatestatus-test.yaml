    metadata:
      name: rayservice-mixed-apps
      namespace: production
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready"
        lastTransitionTime: "2024-01-15T12:00:00Z"
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready"
        lastTransitionTime: "2024-01-15T12:01:00Z"
      serviceStatus: Running
      numServeEndpoints: 10
      lastUpdateTime: "2024-01-15T12:01:00Z"
      observedGeneration: 0
      activeServiceStatus:
        rayClusterName: "rayservice-mixed-apps-cluster1"
        applicationStatuses:
          model-serving:
            status: RUNNING
            message: "Model serving is running"
          data-processing:
            status: UNHEALTHY
            message: "Data processing is unhealthy"

---
name: "RayService with upgrade in progress"
description: "Test aggregating status during upgrade with active and pending clusters"
desiredObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-upgrading
    namespace: default
  spec:
    serveConfigV2: |
      applications:
        - name: api-service
          route_prefix: /api
          import_path: api:service
    upgradeStrategy:
      type: NewCluster
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
statusItems:
  - applied: true
    clusterName: member1
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready"
        lastTransitionTime: "2024-01-15T13:00:00Z"
      - type: UpgradeInProgress
        status: "True"
        reason: BothActivePendingClustersExist
        message: "Upgrading to new cluster"
        lastTransitionTime: "2024-01-15T13:10:00Z"
      serviceStatus: Running
      numServeEndpoints: 5
      lastUpdateTime: "2024-01-15T13:10:00Z"
      observedGeneration: 3
      activeServiceStatus:
        rayClusterName: "rayservice-upgrading-old"
        targetCapacity: 100
        trafficRoutedPercent: 70
        applicationStatuses:
          api-service:
            status: RUNNING
            message: "API service is running"
      pendingServiceStatus:
        rayClusterName: "rayservice-upgrading-new"
        targetCapacity: 100
        trafficRoutedPercent: 30
        applicationStatuses:
          api-service:
            status: DEPLOYING
            message: "API service is deploying on new cluster"
operation: AggregateStatus
output:
  aggregatedStatus:
    apiVersion: ray.io/v1
    kind: RayService
    metadata:
      name: rayservice-upgrading
      namespace: default
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready"
        lastTransitionTime: "2024-01-15T13:00:00Z"
      - type: UpgradeInProgress
        status: "True"
        reason: BothActivePendingClustersExist
        message: "Upgrading to new cluster"
        lastTransitionTime: "2024-01-15T13:10:00Z"
      serviceStatus: Running
      numServeEndpoints: 5
      lastUpdateTime: "2024-01-15T13:10:00Z"
      observedGeneration: 3
      activeServiceStatus:
        rayClusterName: "rayservice-upgrading-old"
        targetCapacity: 100
        trafficRoutedPercent: 70
        applicationStatuses:
          api-service:
            status: RUNNING
            message: "API service is running"
      pendingServiceStatus:
        rayClusterName: "rayservice-upgrading-new"
        targetCapacity: 100
        trafficRoutedPercent: 30
        applicationStatuses:
          api-service:
            status: DEPLOYING
            message: "API service is deploying on new cluster"