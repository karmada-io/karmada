# test case for aggregating status of RayService
# case1. RayService with two status items from different clusters
# case2. RayService with single status item
# case3. RayService with multiple applications across clusters
# case4. RayService with upgrade in progress

name: "RayService with two status items"
description: "Test aggregating status of RayService with two status items from different clusters"
desiredObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-multi-cluster
    namespace: default
  spec:
    serveConfigV2: |
      applications:
        - name: fruit-app
          route_prefix: /fruit
          import_path: fruit:deployment
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
      workerGroupSpecs:
      - groupName: small-group
        replicas: 2
        template:
          spec:
            containers:
            - name: ray-worker
              image: rayproject/ray:2.9.0
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
statusItems:
  - applied: true
    clusterName: member1
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready with 2 serve endpoints"
        lastTransitionTime: "2024-01-15T10:30:00Z"
      serviceStatus: Running
      numServeEndpoints: 2
      lastUpdateTime: "2024-01-15T10:30:00Z"
      observedGeneration: 1
      activeServiceStatus:
        rayClusterName: "rayservice-multi-cluster-abc123"
        applicationStatuses:
          fruit-app:
            status: RUNNING
            message: "Application is running"
            serveDeploymentStatuses:
              FruitStand:
                status: HEALTHY
                message: "Deployment is healthy"
  - applied: true
    clusterName: member2
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready with 3 serve endpoints"
        lastTransitionTime: "2024-01-15T10:31:00Z"
      serviceStatus: Running
      numServeEndpoints: 3
      lastUpdateTime: "2024-01-15T10:31:00Z"
      observedGeneration: 1
      activeServiceStatus:
        rayClusterName: "rayservice-multi-cluster-def456"
        applicationStatuses:
          fruit-app:
            status: RUNNING
            message: "Application is running"
            serveDeploymentStatuses:
              FruitStand:
                status: HEALTHY
                message: "Deployment is healthy"
operation: AggregateStatus
output:
  aggregatedStatus:
    apiVersion: ray.io/v1
    kind: RayService
    metadata:
      name: rayservice-multi-cluster
      namespace: default
    status:
      conditions:
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready with 2 serve endpoints"
        lastTransitionTime: "2024-01-15T10:30:00Z"
      - type: Ready
        status: "True"
        reason: NonZeroServeEndpoints
        message: "Service is ready with 3 serve endpoints"
        lastTransitionTime: "2024-01-15T10:31:00Z"
      serviceStatus: Running
      numServeEndpoints: 5
      lastUpdateTime: "2024-01-15T10:31:00Z"
      observedGeneration: 1
      activeServiceStatus:
        rayClusterName: "rayservice-multi-cluster-abc123"
        applicationStatuses:
          fruit-app:
            status: RUNNING
            message: "Application is running"
            serveDeploymentStatuses:
              FruitStand:
                status: HEALTHY
                message: "Deployment is healthy"

