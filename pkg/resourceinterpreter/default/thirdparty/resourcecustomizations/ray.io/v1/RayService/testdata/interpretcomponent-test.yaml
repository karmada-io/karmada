---
name: "RayService with custom service configuration"
description: "Test interpreting component of RayService with custom serve service and upgrade strategy"
desiredObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    namespace: production
    name: rayservice-advanced
  spec:
    serveConfigV2: |
      applications:
        - name: model-serving
          route_prefix: /predict
          import_path: model_server:app
          deployments:
            - name: ModelServer
              num_replicas: 3
              ray_actor_options:
                num_cpus: 2
                num_gpus: 0.5
    upgradeStrategy:
      type: NewCluster
    rayClusterDeletionDelaySeconds: 600
    serveService:
      metadata:
        name: model-serve-svc
      spec:
        selector:
          ray.io/serve: "true"
        ports:
        - port: 8000
          targetPort: 8000
          name: serve
    rayClusterConfig:
      rayVersion: "2.9.0"
      enableInTreeAutoscaling: true
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
          num-cpus: "0"
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
              resources:
                requests:
                  cpu: "2"
                  memory: "8Gi"
      workerGroupSpecs:
      - groupName: serve-group
        replicas: 3
        minReplicas: 2
        maxReplicas: 10
        rayStartParams: {}
        template:
          spec:
            containers:
            - name: ray-worker
              image: rayproject/ray:2.9.0
              resources:
                requests:
                  cpu: "2"
                  memory: "4Gi"
operation: InterpretComponent
output:
  components:
    - name: ray-head
      replicas: 1
      replicaRequirements:
        resourceRequest:
          "cpu": "2"
          "memory": "8Gi"
    - name: serve-group
      replicas: 3
      replicaRequirements:
        resourceRequest:
          "cpu": "2"
          "memory": "4Gi"