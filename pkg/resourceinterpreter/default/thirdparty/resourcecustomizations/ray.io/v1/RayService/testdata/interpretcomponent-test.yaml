# test case for interpreting component of RayService
# case1. RayService with head and single worker group
# case2. RayService with head and multiple worker groups with custom names
# case3. RayService with head and worker groups without explicit names
# case4. RayService with zero replica worker group
# case5. RayService with serve configuration

name: "RayService with head and single worker group"
description: "Test interpreting component of RayService with head and one worker group"
desiredObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    name: rayservice-sample
    namespace: test-namespace
  spec:
    serveConfigV2: |
      applications:
        - name: fruit-app
          route_prefix: /fruit
          import_path: fruit:deployment
          runtime_env:
            pip:
              - requests
              - pandas
          deployments:
            - name: MangoStand
              num_replicas: 1
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
              resources:
                limits:
                  cpu: "2"
                  memory: "4Gi"
                requests:
                  cpu: "1"
                  memory: "2Gi"
      workerGroupSpecs:
      - groupName: small-group
        replicas: 3
        rayStartParams: {}
        template:
          spec:
            containers:
            - name: ray-worker
              image: rayproject/ray:2.9.0
              resources:
                limits:
                  cpu: "1"
                  memory: "2Gi"
                requests:
                  cpu: "500m"
                  memory: "1Gi"
operation: InterpretComponent
output:
  components:
    - name: ray-head
      replicas: 1
      replicaRequirements:
        resourceRequest:
          "cpu": "1"
          "memory": "2Gi"
    - name: small-group
      replicas: 3
      replicaRequirements:
        resourceRequest:
          "cpu": "500m"
          "memory": "1Gi"

---
name: "RayService with head and multiple worker groups"
description: "Test interpreting component of RayService with head and multiple worker groups with custom names"
desiredObj:
  apiVersion: ray.io/v1
  kind: RayService
  metadata:
    namespace: default
    name: rayservice-multi
  spec:
    serveConfigV2: |
      applications:
        - name: ml-app
          route_prefix: /ml
          import_path: ml_app:app
          deployments:
            - name: Predictor
              num_replicas: 2
            - name: Preprocessor
              num_replicas: 1
    upgradeStrategy:
      type: NewCluster
    rayClusterDeletionDelaySeconds: 300
    rayClusterConfig:
      rayVersion: "2.9.0"
      headGroupSpec:
        rayStartParams:
          dashboard-host: "0.0.0.0"
        template:
          spec:
            containers:
            - name: ray-head
              image: rayproject/ray:2.9.0
              resources:
                limits:
                  cpu: "4"
                  memory: "8Gi"
                requests:
                  cpu: "2"
                  memory: "4Gi"
      workerGroupSpecs:
      - groupName: compute-group
        replicas: 5
        rayStartParams: {}
        template:
          spec:
            containers:
            - name: ray-worker
              image: rayproject/ray:2.9.0
              resources:
                limits:
                  cpu: "2"
                  memory: "4Gi"
                requests:
                  cpu: "1"
                  memory: "2Gi"
      - groupName: gpu-group
        replicas: 2
        rayStartParams: {}
        template:
          spec:
            containers:
            - name: ray-worker
              image: rayproject/ray:2.9.0-gpu
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: "1"
                requests:
                  cpu: "2"
                  memory: "8Gi"
                  nvidia.com/gpu: "1"
operation: InterpretComponent
output:
  components:
    - name: ray-head
      replicas: 1
      replicaRequirements:
        resourceRequest:
          "cpu": "2"
          "memory": "4Gi"
    - name: compute-group
      replicas: 5
      replicaRequirements:
        resourceRequest:
          "cpu": "1"
          "memory": "2Gi"
    - name: gpu-group
      replicas: 2
      replicaRequirements:
        resourceRequest:
          "cpu": "2"
          "memory": "8Gi"
          "nvidia.com/gpu": "1"

