---
name: "Rollout with no strategy (returns empty components)"
description: "Test that a Rollout with no strategy returns an empty component list"
observedObj:
  apiVersion: argoproj.io/v1alpha1
  kind: Rollout
  metadata:
    name: no-strategy
    namespace: default
  spec:
    replicas: 1
    template:
      spec:
        containers:
          - name: myapp
            image: myapp:latest
operation: InterpretComponent
output:
  components: []

---
name: "Rollout canary strategy with nodeSelector, tolerations, and priorityClassName"
description: "Test interpreting components with pod topology spread constraints"
observedObj:
  apiVersion: argoproj.io/v1alpha1
  kind: Rollout
  metadata:
    name: canary-topology
    namespace: default
  spec:
    replicas: 2
    strategy:
      canary:
        canaryReplicas: 1
        stableTemplate:
          spec:
            nodeSelector:
              disktype: ssd
              region: us-west
            tolerations:
              - key: "nvidia.com/gpu"
                operator: "Exists"
                effect: "NoSchedule"
            priorityClassName: high-priority
            containers:
              - name: myapp
                image: myapp:stable
                resources:
                  requests:
                    cpu: "1"
                    memory: 1Gi
        canaryTemplate:
          spec:
            nodeSelector:
              disktype: ssd
            containers:
              - name: myapp
                image: myapp:canary
                resources:
                  requests:
                    cpu: "2"
                    memory: 2Gi
operation: InterpretComponent
output:
  components:
    - name: stable
      replicas: 2
      replicaRequirements:
        resourceRequest:
          cpu: "1"
          memory: 1Gi
        nodeClaim:
          nodeSelector:
            disktype: ssd
            region: us-west
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
        priorityClassName: high-priority
    - name: canary
      replicas: 1
      replicaRequirements:
        resourceRequest:
          cpu: "2"
          memory: 2Gi
        nodeClaim:
          nodeSelector:
            disktype: ssd

---
name: "Rollout blue-green strategy with nil previewTemplate"
description: "Test that blue-green gracefully handles a nil previewTemplate"
observedObj:
  apiVersion: argoproj.io/v1alpha1
  kind: Rollout
  metadata:
    name: bluegreen-nil-preview
    namespace: default
  spec:
    replicas: 2
    strategy:
      blueGreen:
        activeTemplate:
          spec:
            containers:
              - name: myapp
                image: myapp:v1
                resources:
                  requests:
                    cpu: "1"
                    memory: 512Mi
operation: InterpretComponent
output:
  components:
    - name: active
      replicas: 2
      replicaRequirements:
        resourceRequest:
          cpu: "1"
          memory: 512Mi
    - name: preview
      replicas: 1

