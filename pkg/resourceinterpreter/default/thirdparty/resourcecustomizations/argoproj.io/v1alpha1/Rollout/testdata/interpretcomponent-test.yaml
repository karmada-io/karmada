  metadata:
    name: canary-default-replicas-count
    namespace: default
  spec:
    strategy:
      canary:
        canaryTemplate:
          spec:
            containers:
              - name: myapp
                image: myapp:canary
                resources:
                  requests:
                    cpu: "500m"
        stableTemplate:
          spec:
            containers:
              - name: myapp
                image: myapp:stable
                resources:
                  requests:
                    cpu: "500m"
operation: InterpretComponent
output:
  components:
    - name: stable
      replicas: 1
      replicaRequirements:
        resourceRequest:
          cpu: "500m"
    - name: canary
      replicas: 1
      replicaRequirements:
        resourceRequest:
          cpu: "500m"
