- name: sloth-slo-alerts-karmada-scheduler-availability
  rules:
  - alert: KarmadaSchedulerAvailabilityBurnRateHigh
    expr: |
      (
          (slo:sli_error:ratio_rate5m{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (14.4 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate1h{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (14.4 * 0.0009999999999999432))
      )
      or ignoring (sloth_window)
      (
          (slo:sli_error:ratio_rate30m{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (6 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate6h{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (6 * 0.0009999999999999432))
      )
    labels:
      severity: critical
      sloth_severity: page
    annotations:
      dashboard_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      description: |
        This SLO tracks the success rate of the Karmada scheduler when placing workloads across member clusters. The scheduler determines which clusters should host resources based on policies. Violations mean workloads are failing to be scheduled to appropriate member clusters, preventing resource propagation.
      runbook_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      summary: '[KarmadaAlerts][Page] Karmada Scheduler Availability SLO Error Budget
        Burn Rate Exceeded'
      title: '[Page] {{ $labels.sloth_service }} {{ $labels.sloth_slo }} SLO error
        budget burn rate is too fast.'
  - alert: KarmadaSchedulerAvailabilityBurnRateHigh
    expr: |
      (
          (slo:sli_error:ratio_rate2h{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (3 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate1d{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (3 * 0.0009999999999999432))
      )
      or ignoring (sloth_window)
      (
          (slo:sli_error:ratio_rate6h{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (1 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate3d{sloth_id="karmada-scheduler-availability", sloth_service="karmada", sloth_slo="scheduler-availability"} > (1 * 0.0009999999999999432))
      )
    labels:
      severity: warning
      sloth_severity: ticket
    annotations:
      dashboard_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      description: |
        This SLO tracks the success rate of the Karmada scheduler when placing workloads across member clusters. The scheduler determines which clusters should host resources based on policies. Violations mean workloads are failing to be scheduled to appropriate member clusters, preventing resource propagation.
      runbook_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      summary: '[KarmadaAlerts][Ticket] Karmada Scheduler Availability SLO Error Budget
        Burn Rate Exceeded'
      title: '[Ticket] {{ $labels.sloth_service }} {{ $labels.sloth_slo }} SLO error
        budget burn rate is too fast.'
