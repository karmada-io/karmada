- name: sloth-slo-alerts-karmada-scheduler-estimator-availability
  rules:
  - alert: KarmadaSchedulerEstimatorAvailabilityBurnRateHigh
    expr: |
      (
          (slo:sli_error:ratio_rate5m{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (14.4 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate1h{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (14.4 * 0.0009999999999999432))
      )
      or ignoring (sloth_window)
      (
          (slo:sli_error:ratio_rate30m{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (6 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate6h{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (6 * 0.0009999999999999432))
      )
    labels:
      severity: critical
      sloth_severity: page
    annotations:
      dashboard_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      description: |
        This SLO monitors the scheduler estimator's ability to provide cluster capacity estimates. The estimator helps the scheduler make informed placement decisions. Violations mean the scheduler lacks accurate capacity information, potentially leading to suboptimal workload placement or scheduling failures.
      runbook_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      summary: '[KarmadaAlerts][Page] Karmada Scheduler Estimator Availability SLO
        Error Budget Burn Rate Exceeded'
      title: '[Page] {{ $labels.sloth_service }} {{ $labels.sloth_slo }} SLO error
        budget burn rate is too fast.'
  - alert: KarmadaSchedulerEstimatorAvailabilityBurnRateHigh
    expr: |
      (
          (slo:sli_error:ratio_rate2h{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (3 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate1d{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (3 * 0.0009999999999999432))
      )
      or ignoring (sloth_window)
      (
          (slo:sli_error:ratio_rate6h{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (1 * 0.0009999999999999432))
          and ignoring (sloth_window)
          (slo:sli_error:ratio_rate3d{sloth_id="karmada-scheduler-estimator-availability", sloth_service="karmada", sloth_slo="scheduler-estimator-availability"} > (1 * 0.0009999999999999432))
      )
    labels:
      severity: warning
      sloth_severity: ticket
    annotations:
      dashboard_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      description: |
        This SLO monitors the scheduler estimator's ability to provide cluster capacity estimates. The estimator helps the scheduler make informed placement decisions. Violations mean the scheduler lacks accurate capacity information, potentially leading to suboptimal workload placement or scheduling failures.
      runbook_url: https://karmada.io/docs/administrator/monitoring/karmada-observability
      summary: '[KarmadaAlerts][Ticket] Karmada Scheduler Estimator Availability SLO
        Error Budget Burn Rate Exceeded'
      title: '[Ticket] {{ $labels.sloth_service }} {{ $labels.sloth_slo }} SLO error
        budget burn rate is too fast.'
