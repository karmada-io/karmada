name: Operator Installation Test
on:
  pull_request:
    paths:
      - 'operator/**'
jobs:
  installed-by-operator:
    name: installation test
    runs-on: ubuntu-22.04
    # prevent job running from forked repository
    if: ${{ github.repository == 'karmada-io/karmada' }}
    steps:
      - name: checkout code
        uses: actions/checkout@v3
        with:
          # Number of commits to fetch. 0 indicates all history for all branches and tags.
          # We need to guess version via git tags.
          fetch-depth: 0
      - name: install Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.20.11
      - name: run installation test
        run: |
          hack/verify-operator-installed.sh
      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: karmada_operator_installion_log
          path: ${{ github.workspace }}/karmada_operator_installion_logs
      - name: upload kind logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: karmada_kind_log
          path: /tmp/karmada/
