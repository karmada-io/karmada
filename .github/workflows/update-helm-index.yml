name: Update Helm Chart Index (Pull Request)
env:
  HELM_VERSION: v3.17.3
on:
  workflow_run:
    workflows:
      - "Build Release"
    types:
      - completed
  workflow_dispatch:
    inputs:
      versions:
        description: 'The versions to update (e.g., v1.17.1 v1.16.2)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  get-helm-versions:
    name: Get Helm Versions
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
      should_run: ${{ steps.get-versions.outputs.should_run }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - id: get-versions
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "versions=${{ inputs.versions }}" >> $GITHUB_OUTPUT
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            LATEST_TAG=$(gh api repos/karmada-io/karmada/releases/latest | jq -r '.tag_name')
            RELEASE_TAG=${{ github.event.workflow_run.head_branch }}
            if [ "$RELEASE_TAG" = "$LATEST_TAG" ] && echo "$LATEST_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.0$'; then
              echo "versions=$LATEST_TAG" >> $GITHUB_OUTPUT
              echo "should_run=true" >> $GITHUB_OUTPUT
            else
              echo "Skipping helm index update: release tag ($RELEASE_TAG) is not the latest ($LATEST_TAG) or not a minor version."
              echo "should_run=false" >> $GITHUB_OUTPUT
            fi
          fi

  update-index-pr:
    name: Update Index and Create PR
    permissions:
      contents: write
      pull-requests: write
    needs: get-helm-versions
    if: needs.get-helm-versions.outputs.should_run == 'true'
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      VERSIONS: ${{ needs.get-helm-versions.outputs.versions }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: master
          # fetch-depth:
          # 0 indicates all history for all branches and tags.
          fetch-depth: 0
      - name: Install Helm
        run: |
          curl --fail --show-error https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash -s -- --version ${HELM_VERSION}
      - name: Update Helm Index
        run: |
          for VERSION in ${{ env.VERSIONS }}; do
            echo "Processing version: $VERSION"
            # Update Karmada Index
            curl --fail --show-error -L -o charts/karmada/karmada-chart-${VERSION}.tgz "https://github.com/karmada-io/karmada/releases/download/${VERSION}/karmada-chart-${VERSION}.tgz"
            helm repo index charts/karmada --url "https://github.com/karmada-io/karmada/releases/download/${VERSION}" --merge charts/index.yaml
            mv charts/karmada/index.yaml charts/index.yaml
          
            # Update Karmada Operator Index
            curl --fail --show-error -L -o charts/karmada-operator/karmada-operator-chart-${VERSION}.tgz "https://github.com/karmada-io/karmada/releases/download/${VERSION}/karmada-operator-chart-${VERSION}.tgz"
            helm repo index charts/karmada-operator --url "https://github.com/karmada-io/karmada/releases/download/${VERSION}" --merge charts/index.yaml
            mv charts/karmada-operator/index.yaml charts/index.yaml
          
            # Clean up tgz
            rm -f charts/karmada/*.tgz
            rm -f charts/karmada-operator/*.tgz
          done
      - name: Remove Common Entry
        run: |
          sed -i '/^  common:$/,/^  [a-zA-Z]/{/^  common:/d; /^  [a-zA-Z]/!d}' charts/index.yaml
      - name: commit changes and create pull request
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto-action-helm-index-${{ github.sha }}"
          git checkout -b $BRANCH
          git add charts/index.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          DISPLAY_VERSIONS=$(echo "${{ env.VERSIONS }}" | sed 's/ /, /g')
          git commit -s -m "update helm chart index for $DISPLAY_VERSIONS"
          
          if [ "${{ github.run_attempt }}" -gt 1 ]; then
            echo "Retry attempt detected, force pushing to existing branch..."
            git push -f --set-upstream origin $BRANCH
          else
            git push origin $BRANCH
          
            PR_BODY=$(cat <<EOF
          /kind feature

          Automated Helm chart index update for versions: \`$DISPLAY_VERSIONS\`.

          - Downloaded chart assets from release(s).
          - Merged new versions into \`charts/index.yaml\`.

          This PR was generated by the [Update Helm Chart Index](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
          
          **Does this PR introduce a user-facing change?**:
          \`\`\`release-note
          \`Helm chart\`: Added helm index for \`$DISPLAY_VERSIONS\`.
          \`\`\`
          EOF
          )
            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "Update Helm Chart Index for $DISPLAY_VERSIONS" \
              --body "$PR_BODY"
          fi
