name: Update Helm Chart Index (Pull Request)
env:
  HELM_VERSION: v3.17.3
on:
  workflow_run:
    workflows:
      - "Build Release"
    types:
      - completed
  workflow_dispatch:
    inputs:
      version:
        description: 'The version to update (e.g., v1.17.0)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-index-pr:
    runs-on: ubuntu-22.04
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          # fetch-depth:
          # 0 indicates all history for all branches and tags.
          # for `git describe --tags` in Makefile.
          fetch-depth: 0
      - name: Set Version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          else
            LATEST_TAG=`gh api repos/karmada-io/karmada/releases/latest | jq -r '.tag_name'`
            echo "VERSION=$LATEST_TAG" >> $GITHUB_ENV
          fi
      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Update Karmada Index
        run: |
          curl --fail --show-error -L -o charts/karmada/karmada-chart-${{ env.VERSION }}.tgz "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}/karmada-chart-${{ env.VERSION }}.tgz"
          
          helm repo index charts/karmada --url "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}" --merge charts/index.yaml
          
          mv charts/karmada/index.yaml charts/index.yaml

      - name: Update Karmada Operator Index
        run: |
          curl --fail --show-error -L -o charts/karmada-operator/karmada-operator-chart-${{ env.VERSION }}.tgz "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}/karmada-operator-chart-${{ env.VERSION }}.tgz"
          
          helm repo index charts/karmada-operator --url "https://github.com/karmada-io/karmada/releases/download/${{ env.VERSION }}" --merge charts/index.yaml
          
          mv charts/karmada-operator/index.yaml charts/index.yaml

      - name: Clean up and Remove Common Entry
        run: |
          # Remove downloaded chart packages
          rm -f charts/karmada/*.tgz
          rm -f charts/karmada-operator/*.tgz
          
          # Remove the common entry if it exists
          sed -i '/^  common:$/,/^  [a-zA-Z]/{/^  common:/d; /^  [a-zA-Z]/!d}' charts/index.yaml

      - name: commit changes and create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          BRANCH="auto-action-helm-index-${{ github.sha }}-${{ github.run_attempt }}"
          git checkout -b $BRANCH
          git add charts/index.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -s -m "update helm chart index for ${{ env.VERSION }}"
          git push origin $BRANCH
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Update Helm Chart Index for ${{ env.VERSION }}" \
            --body "$(cat <<EOF
          /kind feature

          Automated Helm chart index update for version \`${{ env.VERSION }}\`.

          - Downloaded chart assets from release \`${{ env.VERSION }}\`.
          - Merged new versions into \`charts/index.yaml\`.
          - Cleaned up auto-generated \`common\` entries.

          This PR was generated by the [Update Helm Chart Index](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow.
        
          **Does this PR introduce a user-facing change?**:
          \`\`\`release-note
          \`Helm chart\`: Added helm index for \`${{ env.VERSION }}\`.
          \`\`\`
          EOF
          )"
