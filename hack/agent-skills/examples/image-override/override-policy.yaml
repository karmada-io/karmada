apiVersion: policy.karmada.io/v1alpha1
kind: OverridePolicy
metadata:
  name: app-cn-mirror
  namespace: default
spec:
  resourceSelectors:
  - apiVersion: apps/v1
    kind: Deployment
    name: webapp
  overrideRules:
  - targetCluster:
      clusterNames:
      - member-cn
    overriders:
      imageOverrider:
      - component: Registry
        operator: replace
        value: registry.cn-hangzhou.aliyuncs.com/myorg
        predicate:
          path: /spec/template/spec/containers/1/image
