# Minimal valid ClusterPropagationPolicy template.
# Cluster-scoped — do NOT add metadata.namespace.
# Use for cluster-scoped resources (CRDs, ClusterRoles, Namespaces) or
# org-wide rules that must apply across all namespaces.
apiVersion: policy.karmada.io/v1alpha1
kind: ClusterPropagationPolicy
metadata:
  name: ${NAME}
spec:
  resourceSelectors:
    - apiVersion: ${TARGET_API_VERSION}      # e.g., apiextensions.k8s.io/v1
      kind: ${TARGET_KIND}                   # e.g., CustomResourceDefinition
      name: ${TARGET_NAME}
  placement:
    clusterAffinity:
      clusterNames:
        - ${CLUSTER_1}
        - ${CLUSTER_2}
